<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1180" font-family="Meiryo, 'メイリオ', sans-serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrDot" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <!-- ======== 上段: Accounts ======== -->
  <rect x="20" y="20" width="1360" height="300" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="40" y="48" font-size="16" font-weight="bold" fill="#10253F">🔀 複数の作業用Googleアカウント（クライアントからGA4権限を付与される窓口）</text>

  <!-- AcctA -->
  <rect x="60" y="70" width="400" height="230" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="80" y="100" font-size="15" font-weight="bold" fill="#10253F">アカウントA（例: search06）</text>
  <text x="80" y="128" fill="#10253F">担当: サイト1〜20（20サイト分）</text>
  <rect x="80" y="145" width="360" height="140" rx="4" fill="#f1f8ff" stroke="#74b9ff" stroke-width="1"/>
  <text x="95" y="168" font-size="12" fill="#10253F">GA4: サイト1</text>
  <text x="95" y="188" font-size="12" fill="#10253F">GA4: サイト2</text>
  <text x="95" y="208" font-size="12" fill="#10253F">GA4: サイト3</text>
  <text x="95" y="228" font-size="12" fill="#10253F">…</text>
  <text x="95" y="248" font-size="12" fill="#10253F">GA4: サイト20</text>

  <!-- AcctB -->
  <rect x="500" y="70" width="400" height="230" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="520" y="100" font-size="15" font-weight="bold" fill="#10253F">アカウントB（例: search08）</text>
  <text x="520" y="128" fill="#10253F">担当: サイト21〜40（20サイト分）</text>
  <rect x="520" y="145" width="360" height="140" rx="4" fill="#f1f8ff" stroke="#74b9ff" stroke-width="1"/>
  <text x="535" y="168" font-size="12" fill="#10253F">GA4: サイト21</text>
  <text x="535" y="188" font-size="12" fill="#10253F">GA4: サイト22</text>
  <text x="535" y="208" font-size="12" fill="#10253F">GA4: サイト23</text>
  <text x="535" y="228" font-size="12" fill="#10253F">…</text>
  <text x="535" y="248" font-size="12" fill="#10253F">GA4: サイト40</text>

  <!-- AcctC -->
  <rect x="940" y="70" width="400" height="230" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="960" y="100" font-size="15" font-weight="bold" fill="#10253F">アカウントC（将来・例: search09）</text>
  <text x="960" y="128" fill="#10253F">担当: サイト41〜（新規順次紐付け）</text>
  <rect x="960" y="145" width="360" height="140" rx="4" fill="#f1f8ff" stroke="#74b9ff" stroke-width="1"/>
  <text x="975" y="168" font-size="12" fill="#10253F">GA4: サイト41</text>
  <text x="975" y="188" font-size="12" fill="#10253F">GA4: サイト42</text>
  <text x="975" y="208" font-size="12" fill="#10253F">…</text>

  <!-- ======== 矢印: 上段 → 中段 ======== -->
  <!-- AcctA の各GA4サイト → BigQuery のデータセット (BQ export) -->
  <path d="M 140,300 C 140,360 160,380 180,460" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="50" y="340" font-size="11" fill="#2c3e50">BQエクスポート</text>
  <text x="50" y="355" font-size="11" fill="#2c3e50">（サイト1）</text>

  <path d="M 240,300 C 240,370 270,380 310,460" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="245" y="340" font-size="11" fill="#2c3e50">BQエクスポート</text>
  <text x="245" y="355" font-size="11" fill="#2c3e50">（サイト2）</text>

  <path d="M 360,300 C 360,380 400,400 430,460" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)" stroke-dasharray="0"/>
  <text x="370" y="340" font-size="11" fill="#2c3e50">BQエクスポート</text>
  <text x="370" y="355" font-size="11" fill="#2c3e50">（…サイト20）</text>

  <!-- AcctB の各GA4サイト → 全サイト分データセット -->
  <path d="M 600,300 C 600,380 600,420 600,460" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="540" y="340" font-size="11" fill="#2c3e50">BQエクスポート</text>
  <text x="540" y="355" font-size="11" fill="#2c3e50">（サイト21〜40）</text>

  <path d="M 800,300 C 800,380 780,420 760,460" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- AcctC → 全サイト分 -->
  <path d="M 1100,300 C 1100,380 1000,420 900,460" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="1000" y="340" font-size="11" fill="#2c3e50">BQエクスポート</text>
  <text x="1000" y="355" font-size="11" fill="#2c3e50">（サイト41〜）</text>

  <!-- SA招待 (点線) -->
  <path d="M 260,300 C 260,340 600,380 950,640" stroke="#c92a2a" stroke-width="1.5" fill="none" marker-end="url(#arrDot)" stroke-dasharray="6,4"/>
  <text x="430" y="380" font-size="11" fill="#c92a2a">SA招待（閲覧者）</text>

  <path d="M 700,300 C 700,340 800,440 980,640" stroke="#c92a2a" stroke-width="1.5" fill="none" marker-end="url(#arrDot)" stroke-dasharray="6,4"/>
  <text x="720" y="380" font-size="11" fill="#c92a2a">SA招待（閲覧者）</text>

  <path d="M 1140,300 C 1140,340 1100,540 1020,640" stroke="#c92a2a" stroke-width="1.5" fill="none" marker-end="url(#arrDot)" stroke-dasharray="6,4"/>
  <text x="1150" y="380" font-size="11" fill="#c92a2a">SA招待（閲覧者）</text>

  <!-- ======== 中段: マスターGCPプロジェクト ======== -->
  <rect x="20" y="440" width="1360" height="560" rx="10" fill="#fff9db" stroke="#e67700" stroke-width="3"/>
  <text x="40" y="470" font-size="17" font-weight="bold" fill="#10253F">🌟 マスターGCPプロジェクト（billing ON・一元管理）</text>

  <!-- BigQuery subgraph -->
  <rect x="60" y="490" width="820" height="230" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="80" y="518" font-size="15" font-weight="bold" fill="#10253F">📊 BigQuery（全サイトのデータセット集約）</text>

  <!-- DS1 -->
  <ellipse cx="180" cy="590" rx="80" ry="30" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="180" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">サイト1</text>
  <text x="180" y="602" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <!-- DS2 -->
  <ellipse cx="380" cy="590" rx="80" ry="30" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="380" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">サイト2</text>
  <text x="380" y="602" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <!-- DS... -->
  <ellipse cx="580" cy="590" rx="80" ry="30" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="580" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">…</text>
  <text x="580" y="602" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <!-- DSN -->
  <ellipse cx="780" cy="590" rx="80" ry="30" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="780" y="585" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">全サイト分</text>
  <text x="780" y="602" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <text x="470" y="685" text-anchor="middle" font-size="12" fill="#666">※ GA4→BQエクスポートで各サイトごとに自動生成される</text>

  <!-- Cloud Scheduler -->
  <rect x="930" y="510" width="180" height="70" rx="8" fill="#ffffff" stroke="#5f3dc4" stroke-width="1.5"/>
  <text x="1020" y="538" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">⏰ Cloud Scheduler</text>
  <text x="1020" y="558" text-anchor="middle" font-size="11" fill="#10253F">毎朝10:30 cron</text>

  <!-- Cloud Run Jobs -->
  <rect x="930" y="620" width="180" height="70" rx="8" fill="#ffffff" stroke="#5f3dc4" stroke-width="1.5"/>
  <text x="1020" y="648" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">🚀 Cloud Run Jobs</text>
  <text x="1020" y="668" text-anchor="middle" font-size="11" fill="#10253F">全サイトのPython処理</text>

  <!-- Service Account -->
  <rect x="1160" y="620" width="200" height="70" rx="8" fill="#ffffff" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="1260" y="648" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">🔑 サービスアカウント</text>
  <text x="1260" y="668" text-anchor="middle" font-size="11" fill="#10253F">各GA4に閲覧者として招待</text>

  <!-- Cloud Logging -->
  <rect x="930" y="750" width="430" height="70" rx="8" fill="#ffffff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="1145" y="778" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">📝 Cloud Logging</text>
  <text x="1145" y="798" text-anchor="middle" font-size="11" fill="#10253F">実行ログ集約・エラー通知・監視</text>

  <!-- 内部矢印: Scheduler → Run -->
  <path d="M 1020,580 L 1020,620" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Run ↔ SA (認証) -->
  <path d="M 1110,655 L 1160,655" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrDot)" stroke-dasharray="5,3"/>
  <text x="1115" y="645" font-size="10" fill="#666">認証</text>

  <!-- Run → BigQuery -->
  <path d="M 930,655 C 870,655 880,600 880,590" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="840" y="630" font-size="11" fill="#333">BQクエリ</text>

  <!-- Run → Cloud Logging -->
  <path d="M 1020,690 L 1020,750" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="1030" y="725" font-size="11" fill="#333">ログ送信</text>

  <!-- ======== 下段: Google Spreadsheet ======== -->
  <rect x="300" y="1040" width="800" height="110" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="700" y="1075" text-anchor="middle" font-size="16" font-weight="bold" fill="#10253F">📊 Google Spreadsheet</text>
  <text x="700" y="1100" text-anchor="middle" font-size="13" fill="#10253F">全サイト分のスプシ群（CVユーザージャーニー等を自動書き込み）</text>
  <text x="700" y="1125" text-anchor="middle" font-size="11" fill="#666">※ クライアントと共有するアウトプット先</text>

  <!-- 中段 → 下段 矢印 -->
  <path d="M 1020,820 C 1020,900 700,980 700,1040" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="850" y="970" font-size="13" font-weight="bold" fill="#333">書き込み（Sheets API）</text>
</svg>
