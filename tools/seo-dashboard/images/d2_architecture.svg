<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1200" font-family="Meiryo, 'メイリオ', sans-serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2c3e50"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c92a2a"/>
    </marker>
    <marker id="arrGray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <!-- ======== 上段: Accounts ======== -->
  <rect x="20" y="20" width="1360" height="290" rx="10" fill="#e7f5ff" stroke="#1864ab" stroke-width="2"/>
  <text x="40" y="48" font-size="16" font-weight="bold" fill="#10253F">🔀 複数の作業用Googleアカウント（クライアントからGA4権限を付与される窓口）</text>

  <!-- AcctA -->
  <rect x="60" y="70" width="400" height="220" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="80" y="100" font-size="15" font-weight="bold" fill="#10253F">アカウントA（例: search06）</text>
  <text x="80" y="122" font-size="12" fill="#10253F">担当: サイト1〜20（20サイト分）</text>
  <text x="95" y="152" font-size="12" fill="#10253F">GA4: サイト1</text>
  <text x="95" y="172" font-size="12" fill="#10253F">GA4: サイト2</text>
  <text x="95" y="192" font-size="12" fill="#10253F">GA4: サイト3</text>
  <text x="95" y="212" font-size="12" fill="#10253F">…</text>
  <text x="95" y="232" font-size="12" fill="#10253F">GA4: サイト20</text>

  <!-- AcctB -->
  <rect x="500" y="70" width="400" height="220" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="520" y="100" font-size="15" font-weight="bold" fill="#10253F">アカウントB（例: search08）</text>
  <text x="520" y="122" font-size="12" fill="#10253F">担当: サイト21〜40（20サイト分）</text>
  <text x="535" y="152" font-size="12" fill="#10253F">GA4: サイト21</text>
  <text x="535" y="172" font-size="12" fill="#10253F">GA4: サイト22</text>
  <text x="535" y="192" font-size="12" fill="#10253F">GA4: サイト23</text>
  <text x="535" y="212" font-size="12" fill="#10253F">…</text>
  <text x="535" y="232" font-size="12" fill="#10253F">GA4: サイト40</text>

  <!-- AcctC -->
  <rect x="940" y="70" width="400" height="220" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="960" y="100" font-size="15" font-weight="bold" fill="#10253F">アカウントC（将来・例: search09）</text>
  <text x="960" y="122" font-size="12" fill="#10253F">担当: サイト41〜（新規順次紐付け）</text>
  <text x="975" y="152" font-size="12" fill="#10253F">GA4: サイト41</text>
  <text x="975" y="172" font-size="12" fill="#10253F">GA4: サイト42</text>
  <text x="975" y="192" font-size="12" fill="#10253F">GA4: サイト43</text>
  <text x="975" y="212" font-size="12" fill="#10253F">…</text>

  <!-- ======== 中段: マスターGCPプロジェクト ======== -->
  <rect x="20" y="440" width="1360" height="590" rx="10" fill="#fff9db" stroke="#e67700" stroke-width="3"/>
  <text x="40" y="470" font-size="17" font-weight="bold" fill="#10253F">🌟 マスターGCPプロジェクト（billing ON・一元管理）</text>

  <!-- BigQuery subgraph -->
  <rect x="60" y="500" width="820" height="220" rx="8" fill="#ffffff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="80" y="528" font-size="15" font-weight="bold" fill="#10253F">📊 BigQuery（全サイトのデータセット集約）</text>

  <!-- Datasets (top at y=580, center y=610, bottom y=640) -->
  <ellipse cx="180" cy="610" rx="80" ry="28" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="180" y="605" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">サイト1</text>
  <text x="180" y="622" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <ellipse cx="380" cy="610" rx="80" ry="28" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="380" y="605" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">サイト2</text>
  <text x="380" y="622" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <ellipse cx="580" cy="610" rx="80" ry="28" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="580" y="605" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">…</text>
  <text x="580" y="622" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <ellipse cx="780" cy="610" rx="80" ry="28" fill="#e7f5ff" stroke="#1864ab" stroke-width="1.5"/>
  <text x="780" y="605" text-anchor="middle" font-size="12" font-weight="bold" fill="#10253F">全サイト分</text>
  <text x="780" y="622" text-anchor="middle" font-size="11" fill="#10253F">データセット</text>

  <text x="470" y="700" text-anchor="middle" font-size="11" fill="#666">※ GA4→BQエクスポートで各サイトごとに自動生成される</text>

  <!-- Cloud Scheduler -->
  <rect x="930" y="510" width="180" height="70" rx="8" fill="#ffffff" stroke="#5f3dc4" stroke-width="1.5"/>
  <text x="1020" y="538" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">⏰ Cloud Scheduler</text>
  <text x="1020" y="558" text-anchor="middle" font-size="11" fill="#10253F">毎朝10:30 cron</text>

  <!-- Cloud Run Jobs -->
  <rect x="930" y="620" width="180" height="70" rx="8" fill="#ffffff" stroke="#5f3dc4" stroke-width="1.5"/>
  <text x="1020" y="648" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">🚀 Cloud Run Jobs</text>
  <text x="1020" y="668" text-anchor="middle" font-size="11" fill="#10253F">全サイトのPython処理</text>

  <!-- Service Account -->
  <rect x="1160" y="620" width="200" height="70" rx="8" fill="#ffffff" stroke="#c92a2a" stroke-width="1.5"/>
  <text x="1260" y="648" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">🔑 サービスアカウント</text>
  <text x="1260" y="668" text-anchor="middle" font-size="11" fill="#10253F">各GA4に閲覧者として招待</text>

  <!-- Cloud Logging -->
  <rect x="930" y="750" width="430" height="70" rx="8" fill="#ffffff" stroke="#2b8a3e" stroke-width="1.5"/>
  <text x="1145" y="778" text-anchor="middle" font-size="13" font-weight="bold" fill="#10253F">📝 Cloud Logging</text>
  <text x="1145" y="798" text-anchor="middle" font-size="11" fill="#10253F">実行ログ集約・エラー通知・監視</text>

  <!-- ======== 矢印: 上段 → 中段 ======== -->
  <!-- BQエクスポート: AcctA → DS1, DS2, DS... -->
  <path d="M 160,290 C 160,420 180,500 180,582" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="100" y="370" font-size="11" fill="#2c3e50" font-weight="bold">BQエクスポート</text>
  <text x="110" y="385" font-size="11" fill="#2c3e50">（サイト1）</text>

  <path d="M 260,290 C 260,420 380,500 380,582" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="285" y="370" font-size="11" fill="#2c3e50" font-weight="bold">BQエクスポート</text>
  <text x="295" y="385" font-size="11" fill="#2c3e50">（サイト2）</text>

  <path d="M 360,290 C 360,420 580,500 580,582" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="405" y="430" font-size="11" fill="#2c3e50" font-weight="bold">BQエクスポート</text>
  <text x="415" y="445" font-size="11" fill="#2c3e50">（…サイト20）</text>

  <!-- BQエクスポート: AcctB → DSN (全サイト分を代表) -->
  <path d="M 700,290 C 700,420 780,500 780,582" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="620" y="370" font-size="11" fill="#2c3e50" font-weight="bold">BQエクスポート</text>
  <text x="625" y="385" font-size="11" fill="#2c3e50">（サイト21〜40）</text>

  <!-- BQエクスポート: AcctC → DSN -->
  <path d="M 1100,290 C 1100,400 850,480 780,582" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="1010" y="370" font-size="11" fill="#2c3e50" font-weight="bold">BQエクスポート</text>
  <text x="1015" y="385" font-size="11" fill="#2c3e50">（サイト41〜）</text>

  <!-- SA招待: AcctA/B/C → サービスアカウント(1160,655) 点線赤 -->
  <path d="M 420,290 C 420,420 900,460 1160,640" stroke="#c92a2a" stroke-width="1.5" fill="none" marker-end="url(#arrRed)" stroke-dasharray="6,4"/>
  <text x="500" y="430" font-size="11" fill="#c92a2a">SA招待（閲覧者）</text>

  <path d="M 860,290 C 860,380 1050,440 1160,648" stroke="#c92a2a" stroke-width="1.5" fill="none" marker-end="url(#arrRed)" stroke-dasharray="6,4"/>
  <text x="870" y="400" font-size="11" fill="#c92a2a">SA招待（閲覧者）</text>

  <path d="M 1300,290 C 1300,400 1250,500 1250,620" stroke="#c92a2a" stroke-width="1.5" fill="none" marker-end="url(#arrRed)" stroke-dasharray="6,4"/>
  <text x="1220" y="400" font-size="11" fill="#c92a2a">SA招待（閲覧者）</text>

  <!-- Master 内部矢印 -->
  <!-- Scheduler → Run -->
  <path d="M 1020,580 L 1020,620" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="1030" y="605" font-size="11" fill="#2c3e50">トリガー</text>

  <!-- Run → SA (認証) -->
  <path d="M 1110,655 L 1160,655" stroke="#666" stroke-width="1.5" fill="none" marker-end="url(#arrGray)" stroke-dasharray="5,3"/>
  <text x="1115" y="646" font-size="10" fill="#666">認証</text>

  <!-- Run → BigQuery (BQクエリ) -->
  <path d="M 930,655 C 900,655 900,630 890,620" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="850" y="640" font-size="11" fill="#2c3e50" font-weight="bold">BQクエリ</text>

  <!-- Run → Logging -->
  <path d="M 1020,690 L 1020,750" stroke="#2c3e50" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="1035" y="725" font-size="11" fill="#2c3e50">ログ送信</text>

  <!-- ======== 下段: Google Spreadsheet ======== -->
  <rect x="300" y="1070" width="800" height="110" rx="10" fill="#ebfbee" stroke="#2b8a3e" stroke-width="2"/>
  <text x="700" y="1105" text-anchor="middle" font-size="16" font-weight="bold" fill="#10253F">📊 Google Spreadsheet</text>
  <text x="700" y="1130" text-anchor="middle" font-size="13" fill="#10253F">全サイト分のスプシ群（CVユーザージャーニー等を自動書き込み）</text>
  <text x="700" y="1155" text-anchor="middle" font-size="11" fill="#666">※ クライアントと共有するアウトプット先</text>

  <!-- 中段 → 下段 矢印 -->
  <path d="M 1020,820 C 1020,930 700,1000 700,1070" stroke="#2c3e50" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="800" y="990" font-size="13" font-weight="bold" fill="#2c3e50">書き込み（Sheets API）</text>
</svg>
